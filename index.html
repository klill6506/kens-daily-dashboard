<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1923">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daily Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f8f6f2;
      --surface:      #ffffff;
      --border:       #ddd5c8;
      --border-light: #ece6dd;
      --text:         #1a1a1a;
      --text-muted:   #5c5650;
      --text-meta:    #9a928a;
      --navy:         #0f1923;
      --accent:       #c0540a;
      --accent-dim:   rgba(192,84,10,.12);
      --green:        #14532d;
      --green-bg:     #f0fdf4;
      --green-stripe: #16a34a;
      --yellow:       #713f12;
      --yellow-bg:    #fffbeb;
      --yellow-stripe:#d97706;
      --std-stripe:   #334155;
      --font-serif:   'Newsreader', Georgia, 'Times New Roman', serif;
      --font-sans:    'Source Sans 3', system-ui, -apple-system, sans-serif;
      --header-h:     80px;
      --r:            6px;
      --max-w:        960px;
      --pad:          1.5rem;
    }

    html { font-size: 17px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-top: var(--header-h);
      min-height: 100dvh;
    }

    /* ══ HEADER ══════════════════════════════════════════════════════ */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--navy);
      z-index: 200;
      border-bottom: 3px solid var(--accent);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--pad);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .masthead { display: flex; flex-direction: column; gap: 2px; }

    .masthead-eyebrow {
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--accent);
      line-height: 1;
    }

    .masthead-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
      font-style: italic;
      color: #f8f6f2;
      line-height: 1.0;
      letter-spacing: -0.02em;
    }

    .header-right { text-align: right; flex-shrink: 0; }

    #header-date {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(248,246,242,.8);
      line-height: 1.3;
    }

    #header-updated {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.68rem;
      color: rgba(248,246,242,.42);
      line-height: 1.3;
      margin-top: 2px;
    }

    /* ══ LAYOUT ══════════════════════════════════════════════════════ */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0.75rem 0 5rem;
    }

    /* ══ SECTION SHELL ═══════════════════════════════════════════════ */
    .section-wrap {
      border-bottom: 2px solid var(--border);
      opacity: 0;
      transform: translateY(5px);
      animation: riseIn 0.3s ease forwards;
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .section-wrap:nth-child(1)  { animation-delay: .03s }
    .section-wrap:nth-child(2)  { animation-delay: .06s }
    .section-wrap:nth-child(3)  { animation-delay: .09s }
    .section-wrap:nth-child(4)  { animation-delay: .12s }
    .section-wrap:nth-child(5)  { animation-delay: .15s }
    .section-wrap:nth-child(6)  { animation-delay: .18s }
    .section-wrap:nth-child(7)  { animation-delay: .21s }
    .section-wrap:nth-child(8)  { animation-delay: .24s }
    .section-wrap:nth-child(9)  { animation-delay: .27s }
    .section-wrap:nth-child(10) { animation-delay: .30s }
    .section-wrap:nth-child(11) { animation-delay: .33s }

    /* ══ SECTION HEADER ══════════════════════════════════════════════ */
    .section-toggle {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      padding: 1.1rem var(--pad) 0.7rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }

    .section-toggle:hover  { background: rgba(0,0,0,.02); }
    .section-toggle:active { background: rgba(0,0,0,.04); }

    .toggle-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .deep-tag {
      flex-shrink: 0;
      font-family: var(--font-sans);
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fff;
      background: var(--navy);
      border-radius: 2px;
      padding: 2px 6px;
    }

    .section-count {
      flex-shrink: 0;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-meta);
      background: var(--border-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 8px;
      white-space: nowrap;
    }

    /* Only show count badge when section is collapsed */
    .section-wrap.open .section-count { display: none; }

    .chevron {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--text-meta);
      transition: transform .25s ease;
    }

    /* Chevron points up when open (sections start open) */
    .section-wrap.open .chevron { transform: rotate(180deg); }

    /* ══ ACCORDION BODY ══════════════════════════════════════════════ */
    .section-body {
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    /* Thin accent rule under header when open */
    .section-wrap.open .section-toggle {
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 0;
    }

    /* ══ ITEMS LIST ══════════════════════════════════════════════════ */
    .items-list {
      padding: 0 var(--pad) 1.25rem;
    }

    /* Two-column grid for standard news sections on tablet+ */
    @media (min-width: 620px) {
      .items-list.grid-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 2.5rem;
        align-items: start;
      }
    }

    /* ══ NEWS ITEM ═══════════════════════════════════════════════════ */
    .news-item {
      padding: 0.85rem 0 0.85rem;
      border-bottom: 1px solid var(--border-light);
    }

    .news-item:last-child { border-bottom: none; }

    /* In 2-col grid, last item in each column may not be the final child */
    @media (min-width: 620px) {
      .grid-2col .news-item { border-bottom: 1px solid var(--border-light); }
    }

    .item-headline {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 0.35rem;
      display: block;
    }

    .item-summary {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0.4rem;
    }

    .item-readmore {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: var(--font-sans);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity .15s;
    }

    .item-readmore:hover { opacity: 1; text-decoration: underline; }

    /* ══ WEATHER ═════════════════════════════════════════════════════ */
    .weather-inner {
      margin: 0.75rem var(--pad) 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.25rem 1.5rem;
    }

    .weather-top {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1rem;
    }

    .w-icon { font-size: 3rem; line-height: 1; flex-shrink: 0; }

    .w-center { flex: 1; }

    .w-temp {
      font-family: var(--font-serif);
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
    }

    .w-cond {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .w-hilo { text-align: right; }

    .w-hilo-line {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .w-hilo-line strong { color: var(--text); font-weight: 600; }

    .w-loc {
      font-size: 0.7rem;
      color: var(--text-meta);
      margin-top: 4px;
    }

    .w-forecast {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      border-top: 1px solid var(--border-light);
      padding-top: 0.875rem;
    }

    /* ══ MLB PICKS ═══════════════════════════════════════════════════ */
    .mlb-list {
      padding: 0.75rem var(--pad) 1.25rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.55rem;
    }

    @media (min-width: 620px) {
      .mlb-list { grid-template-columns: 1fr 1fr; }
    }

    .pick-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--std-stripe);
      border-radius: var(--r);
      padding: 0.875rem 1rem;
    }

    .pick-card.HIGH     { border-left-color: var(--green-stripe); background: var(--green-bg); }
    .pick-card.LOW      { border-left-color: var(--yellow-stripe); background: var(--yellow-bg); }
    .pick-card.STANDARD { border-left-color: var(--std-stripe); }

    .pick-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }

    .pick-matchup {
      font-family: var(--font-serif);
      font-size: 0.975rem;
      font-weight: 600;
      color: var(--text);
    }

    .pick-time {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--text-meta);
      flex-shrink: 0;
    }

    .pick-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .pick-label {
      font-family: var(--font-sans);
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--navy);
    }

    .pbadge {
      font-family: var(--font-sans);
      font-size: 0.625rem;
      font-weight: 600;
      border-radius: 3px;
      padding: 2px 7px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pbadge.model { background: rgba(15,25,35,.08); color: var(--navy); }
    .pbadge.line  { background: var(--accent-dim);  color: var(--accent); }
    .pbadge.edge  { background: rgba(15,25,35,.05); color: var(--text-muted); }

    .pick-tier {
      font-family: var(--font-sans);
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-left: auto;
    }

    .HIGH     .pick-tier { color: var(--green); }
    .LOW      .pick-tier { color: var(--yellow); }
    .STANDARD .pick-tier { color: var(--text-meta); }

    /* ══ STATES ══════════════════════════════════════════════════════ */
    .state-loading {
      text-align: center;
      padding: 6rem 1rem 2rem;
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--text-muted);
      font-size: 1.15rem;
    }

    .state-error {
      margin: 2rem var(--pad);
      padding: 1.25rem;
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: var(--r);
      font-size: 0.9rem;
      color: #b91c1c;
      line-height: 1.55;
    }

    /* ══ RESPONSIVE SCALING ══════════════════════════════════════════ */
    /* iPhone — narrow everything down */
    @media (max-width: 500px) {
      :root { --pad: 1rem; }
      html  { font-size: 15px; }
      .masthead-title { font-size: 1.5rem; }
      #header-date    { font-size: 0.75rem; }
    }

    /* Very large screens — add side borders for readability */
    @media (min-width: calc(960px + 2rem)) {
      main {
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        margin-top: 0.5rem;
        border-radius: var(--r) var(--r) 0 0;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>

<header id="site-header">
  <div class="header-inner">
    <div class="masthead">
      <span class="masthead-eyebrow">Morning Edition</span>
      <span class="masthead-title">Daily Briefing</span>
    </div>
    <div class="header-right">
      <span id="header-date">—</span>
      <span id="header-updated">—</span>
    </div>
  </div>
</header>

<main id="content">
  <div class="state-loading">Loading your briefing…</div>
</main>

<script>
(function () {
  'use strict';

  /* ── Helpers ─────────────────────────────────────────────────────── */

  function chevron() {
    return `<svg class="chevron" viewBox="0 0 20 20" fill="none"
      stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 8 10 14 16 8"/>
    </svg>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Accordion ───────────────────────────────────────────────────── */

  function wireAccordion(wrap) {
    const btn  = wrap.querySelector('.section-toggle');
    const body = wrap.querySelector('.section-body');
    if (!btn || !body) return;

    btn.addEventListener('click', () => {
      const opening = !wrap.classList.contains('open');

      if (opening) {
        wrap.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        body.style.maxHeight = body.scrollHeight + 'px';
        body.addEventListener('transitionend', () => {
          if (wrap.classList.contains('open')) body.style.maxHeight = 'none';
        }, { once: true });
      } else {
        // Freeze height (handles both 'none' and explicit px values)
        body.style.maxHeight = body.scrollHeight + 'px';
        wrap.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          body.style.maxHeight = '0';
        }));
      }
    });
  }

  /* ── Section builder ─────────────────────────────────────────────── */

  function buildSection(id, title, bodyHtml, opts = {}) {
    const { deepDive = false, countLabel = '' } = opts;

    const wrap = document.createElement('div');
    wrap.className = 'section-wrap open';  /* open by default */
    wrap.id = 'sec-' + id;

    const ddTag  = deepDive   ? `<span class="deep-tag">Deep Dive</span>` : '';
    const cntTag = countLabel ? `<span class="section-count">${escHtml(countLabel)}</span>` : '';

    wrap.innerHTML = `
      <button class="section-toggle" aria-expanded="true" aria-controls="body-${id}">
        <span class="toggle-left">
          <span class="section-title">${escHtml(title)}</span>
          ${ddTag}
          ${cntTag}
        </span>
        ${chevron()}
      </button>
      <div class="section-body" id="body-${id}" role="region">
        ${bodyHtml}
      </div>`;

    /* Body starts open — no max-height constraint */
    const body = wrap.querySelector('.section-body');
    body.style.maxHeight = 'none';

    wireAccordion(wrap);
    return wrap;
  }

  /* ── News items ──────────────────────────────────────────────────── */

  function renderItems(items, twoCol = false) {
    const rows = items.map(it => {
      const hasUrl   = it.url && it.url !== '#' && it.url !== '';
      const readMore = hasUrl
        ? `<a class="item-readmore" href="${escHtml(it.url)}" target="_blank" rel="noopener noreferrer">${escHtml(it.source || 'Source')} ↗</a>`
        : (it.source ? `<span class="item-readmore" style="color:var(--text-meta);cursor:default">${escHtml(it.source)}</span>` : '');

      return `
        <div class="news-item">
          <span class="item-headline">${escHtml(it.headline)}</span>
          <p class="item-summary">${escHtml(it.summary)}</p>
          ${readMore}
        </div>`;
    }).join('');

    const cls = 'items-list' + (twoCol ? ' grid-2col' : '');
    return `<div class="${cls}">${rows}</div>`;
  }

  /* ── Weather ─────────────────────────────────────────────────────── */

  function renderWeather(w) {
    const body = `
      <div class="weather-inner">
        <div class="weather-top">
          <span class="w-icon">${escHtml(w.icon || '🌤')}</span>
          <div class="w-center">
            <div class="w-temp">${escHtml(w.current)}</div>
            <div class="w-cond">${escHtml(w.conditions)}</div>
          </div>
          <div class="w-hilo">
            <div class="w-hilo-line"><strong>↑ ${w.high}°F</strong></div>
            <div class="w-hilo-line"><strong>↓ ${w.low}°F</strong></div>
            <div class="w-loc">Milledgeville, GA</div>
          </div>
        </div>
        <p class="w-forecast">${escHtml(w.forecast)}</p>
      </div>`;

    return buildSection('weather', '🌤 Weather', body, { countLabel: '30622' });
  }

  /* ── MLB picks ───────────────────────────────────────────────────── */

  function renderMLB(picks) {
    const cards = picks.map(p => {
      const tier = p.confidence || 'STANDARD';
      return `
        <div class="pick-card ${escHtml(tier)}">
          <div class="pick-top">
            <span class="pick-matchup">${escHtml(p.away)} @ ${escHtml(p.home)}</span>
            <span class="pick-time">${escHtml(p.time)}</span>
          </div>
          <div class="pick-row">
            <span class="pick-label">▶ ${escHtml(p.pick)}</span>
            <span class="pbadge model">${p.model_pct}% model</span>
            <span class="pbadge line">${escHtml(p.vegas_line)}</span>
            <span class="pbadge edge">+${p.edge}% edge</span>
            <span class="pick-tier">${escHtml(tier)}</span>
          </div>
        </div>`;
    }).join('');

    return buildSection('mlb', '⚾ MLB Value Picks',
      `<div class="mlb-list">${cards}</div>`,
      { countLabel: picks.length + ' games' });
  }

  /* ── Section metadata ────────────────────────────────────────────── */

  const SECTION_META = {
    'us-news':          { icon: '🇺🇸', deepDive: false, twoCol: true  },
    'international':    { icon: '🌎',  deepDive: false, twoCol: true  },
    'political':        { icon: '🏛',  deepDive: false, twoCol: true  },
    'economic':         { icon: '📈',  deepDive: false, twoCol: true  },
    'ai-news':          { icon: '🤖',  deepDive: true,  twoCol: false },
    'tax-news':         { icon: '🧾',  deepDive: true,  twoCol: false },
    'georgia-assembly': { icon: '🍑',  deepDive: false, twoCol: false },
    'georgia-bulldogs': { icon: '🐾',  deepDive: false, twoCol: true  },
    'entertainment':    { icon: '🎬',  deepDive: false, twoCol: true  },
  };

  /* ── Init ────────────────────────────────────────────────────────── */

  async function init() {
    const main = document.getElementById('content');

    try {
      const resp = await fetch('data.json?v=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' — could not load data.json');
      const data = await resp.json();

      document.getElementById('header-date').textContent    = data.date || '';
      document.getElementById('header-updated').textContent = data.updated_at ? 'Updated ' + data.updated_at : '';

      const frag = document.createDocumentFragment();

      for (const sec of (data.sections || [])) {
        const meta  = SECTION_META[sec.id] || {};
        const title = (meta.icon ? meta.icon + '\u00A0' : '') + sec.title;
        const body  = renderItems(sec.items || [], meta.twoCol || false);
        const cnt   = (sec.items || []).length;

        frag.appendChild(buildSection(sec.id, title, body, {
          deepDive:   meta.deepDive || false,
          countLabel: cnt + (cnt === 1 ? ' item' : ' items'),
        }));
      }

      if (data.weather)                        frag.appendChild(renderWeather(data.weather));
      if (data.mlb_picks && data.mlb_picks.length) frag.appendChild(renderMLB(data.mlb_picks));

      main.innerHTML = '';
      main.appendChild(frag);

    } catch (err) {
      main.innerHTML = `<div class="state-error">
        <strong>Could not load briefing data.</strong><br>${escHtml(err.message)}
      </div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
